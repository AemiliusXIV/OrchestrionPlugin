name: Orchestrion Aria
author: AemiliusXIV (originally Meli, perchbird)
description: |-
  Orchestrion Aria lets you browse, search, and replace the in-game BGM with any track from the full
  FFXIV soundtrack. It also supports playing your own local MP3 and WAV files as BGM replacements,
  with fade transitions and volume sync to the game's master/BGM sliders.
  A curated list of accurate song titles is included so you always know what's playing.
punchline: Browse, replace, and extend the FFXIV BGM — including your own local audio files.
repo_url: https://github.com/AemiliusXIV/OrchestrionPlugin
tags:
  - bgm
  - music
  - audio
changelog: |-
  - Quick Save: a [Save] link now appears in song echo chat messages, letting you bookmark the
    currently playing song to a playlist with one click — no need to leave combat or remember the name.
  - Quick Save: a Save button also appears in the Player (main window and mini player) while a song
    is playing.
  - Quick Save: songs are saved to a "Listen Later" playlist by default, which clears automatically
    when you exit the game. Character switch clearing is a separate toggle, off by default.
  - Quick Save: optional area summary — when you change zone, a chat message lists every song you
    saved during that area.
  - Quick Save: fully configurable in Settings — single or two-action mode, target playlists, button
    labels, confirmation echoes, and clear behaviour.
