name: Orchestrion Aria
author: AemiliusXIV (originally Meli, perchbird)
description: |-
  Orchestrion Aria lets you browse, search, and replace the in-game BGM with any track from the full
  FFXIV soundtrack. It also supports playing your own local MP3 and WAV files as BGM replacements,
  with fade transitions and volume sync to the game's master/BGM sliders.
  A curated list of accurate song titles is included so you always know what's playing.
punchline: Browse, replace, and extend the FFXIV BGM — including your own local audio files.
repo_url: https://github.com/AemiliusXIV/OrchestrionPlugin
tags:
  - bgm
  - music
  - audio
changelog: |-
  - Local Library: audio files imported into the plugin folder no longer show their internal file path.
  - Import from Orchestrion: the import section in Settings is now explicit — no data is copied
    automatically on first launch. A notification on first run will point you to Settings if a
    previous Orchestrion config is detected.
  - Import from Orchestrion: the confirmation popup now lets you choose which categories to import
    (general settings, song replacements, playlists) via an Edit button. All are selected by default.
  - Import from Orchestrion: the section now shows a success summary after importing, and is
    permanently hidden on subsequent sessions once import is complete.
